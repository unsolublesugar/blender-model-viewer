<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Among Us Crewmate</title>
        <style>
            body { margin: 0; }
        </style>
        <script type="module"
            src="https://unpkg.com/@google/model-viewer@4.3.1/dist/model-viewer.min.js"></script>
    </head>
    <body>
        <div style="width:100%; margin:0 auto; height:100vh; height:100dvh;">
            <model-viewer
                alt="Among Us Crewmate"
                src="./amongus.gltf"
                poster="./poster.webp"
                style="width:100%;height:100%;background-color:#ECECEC;"
                shadow-intensity="0.9"
                exposure="0.7"
                camera-controls
                autoplay
                ar-modes="scene-viewer webxr quick-look"
                auto-rotate ar>
            </model-viewer>
        </div>
    </body>
</html>
