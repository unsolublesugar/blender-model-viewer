<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Desk Chair | Blender Model Viewer</title>
        <meta name="description" content="Blenderで作成した3Dモデルをブラウザで表示。スマホならARモードで現実空間に配置できます。">
        <meta property="og:type" content="website">
        <meta property="og:title" content="Desk Chair | Blender Model Viewer">
        <meta property="og:description" content="Blenderで作成した3Dモデルをブラウザで表示。スマホならARモードで現実空間に配置できます。">
        <meta property="og:url" content="https://unsolublesugar.github.io/blender-model-viewer/">
        <meta property="og:image" content="https://unsolublesugar.github.io/blender-model-viewer/og.png">
        <meta name="twitter:card" content="summary_large_image">
        <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
        <link rel="stylesheet" href="./assets/site.css">
        <script type="module"
            src="https://unpkg.com/@google/model-viewer@4.3.1/dist/model-viewer.min.js"></script>
    </head>
    <body>
        <nav class="site-nav">
            <a class="brand" href="./">Blender Model Viewer</a>
            <a class="nav-link" href="./models/">モデル一覧 →</a>
        </nav>
        <div style="width:100%; margin:0 auto; height:100vh; height:100dvh;">
            <model-viewer
                alt="desk_chair"
                src="./desk_chair.glb"
                poster="./poster.webp"
                style="width:100%;height:100%;background-color:#ECECEC;"
                shadow-intensity="0.9"
                exposure="0.7"
                camera-controls
                min-camera-orbit="auto auto 35%"
                max-camera-orbit="auto auto 250%"
                zoom-sensitivity="1.4"
                autoplay
                ar-modes="scene-viewer webxr quick-look"
                auto-rotate ar>
                <button class="hotspot" slot="hotspot-tabletop"
                    data-position="0.2641m 0.0193m -0.0066m"
                    data-normal="0m 1m 0m"
                    data-visibility-attribute="visible"
                    aria-label="天板の説明">
                    <span class="annotation">広めの天板。緑のデスクマット付き</span>
                </button>
                <button class="hotspot" slot="hotspot-chair"
                    data-position="0.0579m -0.0318m 0.0445m"
                    data-normal="0.1251m 0.9543m 0.2713m"
                    data-visibility-attribute="visible"
                    aria-label="チェアの説明">
                    <span class="annotation">セットのチェア。座面はミントグリーン</span>
                </button>
                <button slot="ar-button" class="ar-button">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 3 4.5 7.05v8.1L12 19.2l7.5-4.05v-8.1L12 3z"/>
                        <path d="M4.5 7.05 12 11.1l7.5-4.05M12 11.1v8.1"/>
                    </svg>
                    ARで見る
                </button>
            </model-viewer>
        </div>
        <button class="qr-button" hidden>スマホでARを試す</button>
        <div class="qr-overlay" hidden>
            <div class="qr-card">
                <p class="qr-title">スマホでARを試す</p>
                <div class="qr-code"></div>
                <p class="qr-note">スマホのカメラでこのQRコードを読み取るとこのページが開きます。「ARで見る」ボタンからARモードを起動できます。</p>
                <button class="qr-close">閉じる</button>
            </div>
        </div>
        <script src="./assets/vendor/qrcode.js"></script>
        <script src="./assets/ar-qr.js"></script>
    </body>
</html>
