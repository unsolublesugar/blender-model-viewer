<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Desk Chair | Blender Model Viewer</title>
        <meta name="description" content="Blenderで作成した3Dモデルをブラウザで表示。スマホならARモードで現実空間に配置できます。">
        <meta property="og:type" content="website">
        <meta property="og:title" content="Desk Chair | Blender Model Viewer">
        <meta property="og:description" content="Blenderで作成した3Dモデルをブラウザで表示。スマホならARモードで現実空間に配置できます。">
        <meta property="og:url" content="https://unsolublesugar.github.io/blender-model-viewer/">
        <meta property="og:image" content="https://unsolublesugar.github.io/blender-model-viewer/og.png">
        <meta name="twitter:card" content="summary_large_image">
        <style>
            body { margin: 0; }
        </style>
        <script type="module"
            src="https://unpkg.com/@google/model-viewer@4.3.1/dist/model-viewer.min.js"></script>
    </head>
    <body>
        <div style="width:100%; margin:0 auto; height:100vh; height:100dvh;">
            <model-viewer
                alt="desk_chair"
                src="./desk_chair.glb"
                poster="./poster.webp"
                style="width:100%;height:100%;background-color:#ECECEC;"
                shadow-intensity="0.9"
                exposure="0.7"
                camera-controls
                autoplay
                ar-modes="scene-viewer webxr quick-look"
                auto-rotate ar>
            </model-viewer>
        </div>
    </body>
</html>
